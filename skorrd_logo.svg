<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');
    .logo-text { font-family: 'Nunito', sans-serif; font-weight: 900; }
  </style>
</defs>

<!-- Light bg version -->
<rect x="40" y="20" width="280" height="120" rx="16" fill="#fffbf5"/>
<text x="80" y="105" class="logo-text" font-size="72" letter-spacing="-2" fill="#1a1207">sk</text>
<text x="183" y="105" class="logo-text" font-size="72" letter-spacing="-2" fill="#ff6b4a">orr</text>
<text x="317" y="105" class="logo-text" font-size="72" letter-spacing="-2" fill="#1a1207">d</text>
<text x="80" y="128" font-family="'Nunito', sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#8a7a65" text-anchor="start">LAST-MINUTE APPOINTMENTS</text>

<!-- Dark bg version -->
<rect x="360" y="20" width="280" height="120" rx="16" fill="#1a1207"/>
<text x="400" y="105" class="logo-text" font-size="72" letter-spacing="-2" fill="#fffbf5">sk</text>
<text x="503" y="105" class="logo-text" font-size="72" letter-spacing="-2" fill="#ff6b4a">orr</text>
<text x="637" y="105" class="logo-text" font-size="72" letter-spacing="-2" fill="#fffbf5">d</text>
<text x="400" y="128" font-family="'Nunito', sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="rgba(255,251,245,0.4)" text-anchor="start">LAST-MINUTE APPOINTMENTS</text>

<!-- Icon mark only — square -->
<rect x="40" y="165" width="80" height="80" rx="16" fill="#ff6b4a"/>
<text x="80" y="226" class="logo-text" font-size="48" letter-spacing="-2" fill="#fffbf5" text-anchor="middle">S</text>

<!-- Icon mark — dark -->
<rect x="140" y="165" width="80" height="80" rx="16" fill="#1a1207"/>
<text x="180" y="226" class="logo-text" font-size="48" letter-spacing="-2" fill="#ff6b4a" text-anchor="middle">S</text>

<!-- Icon mark — cream -->
<rect x="240" y="165" width="80" height="80" rx="16" fill="#fffbf5" stroke="#ede8df" stroke-width="1.5"/>
<text x="280" y="226" class="logo-text" font-size="48" letter-spacing="-2" fill="#1a1207" text-anchor="middle">S</text>

<!-- Compact wordmark for nav -->
<rect x="360" y="165" width="280" height="80" rx="12" fill="#fffbf5" stroke="#ede8df" stroke-width="1"/>
<text x="500" y="221" class="logo-text" font-size="36" letter-spacing="-1" fill="#1a1207" text-anchor="middle">sk<tspan fill="#ff6b4a">orr</tspan>d</text>

<!-- Labels -->
<text x="80" y="262" font-family="sans-serif" font-size="11" fill="#8a7a65" text-anchor="middle">coral on cream</text>
<text x="180" y="262" font-family="sans-serif" font-size="11" fill="#8a7a65" text-anchor="middle">coral on dark</text>
<text x="280" y="262" font-family="sans-serif" font-size="11" fill="#8a7a65" text-anchor="middle">dark on cream</text>
<text x="500" y="262" font-family="sans-serif" font-size="11" fill="#8a7a65" text-anchor="middle">nav wordmark</text>
</svg>