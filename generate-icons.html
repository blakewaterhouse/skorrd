<!DOCTYPE html>
<html>
<head><title>Skorrd — Generate PWA Icons</title></head>
<body style="font-family:sans-serif;padding:40px;background:#fffbf5">
<h2>Skorrd PWA Icon Generator</h2>
<p>Click the buttons below to download each icon, then place them in the <code>icons/</code> folder.</p>
<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:24px">
  <div><canvas id="c192" width="192" height="192"></canvas><br><button onclick="dl('c192','icon-192.png')">Download icon-192.png</button></div>
  <div><canvas id="c512" width="512" height="512"></canvas><br><button onclick="dl('c512','icon-512.png')">Download icon-512.png</button></div>
  <div><canvas id="cm512" width="512" height="512"></canvas><br><button onclick="dl('cm512','icon-maskable-512.png')">Download icon-maskable-512.png</button></div>
</div>
<script>
function drawIcon(canvas, size, maskable) {
  const ctx = canvas.getContext('2d')
  const pad = maskable ? size * 0.1 : 0
  const r = (size - pad * 2) * 0.22

  // Background
  ctx.fillStyle = maskable ? '#ff6b4a' : '#fffbf5'
  if (maskable) {
    ctx.fillRect(0, 0, size, size)
  } else {
    ctx.beginPath()
    ctx.roundRect(pad, pad, size - pad*2, size - pad*2, r)
    ctx.fill()
  }

  // Rounded rect (non-maskable needs the coral rect)
  if (!maskable) {
    ctx.fillStyle = '#ff6b4a'
    ctx.beginPath()
    ctx.roundRect(pad, pad, size - pad*2, size - pad*2, r)
    ctx.fill()
  }

  // Letter S
  ctx.fillStyle = '#ffffff'
  ctx.font = `900 ${size * 0.55}px Arial Black, Arial`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('S', size / 2, size / 2 + size * 0.03)
}

drawIcon(document.getElementById('c192'), 192, false)
drawIcon(document.getElementById('c512'), 512, false)
drawIcon(document.getElementById('cm512'), 512, true)

function dl(id, name) {
  const a = document.createElement('a')
  a.href = document.getElementById(id).toDataURL('image/png')
  a.download = name
  a.click()
}
</script>
</body>
</html>
